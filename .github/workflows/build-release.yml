name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build, for example main or v1.2.0'
        required: false
        default: 'main'
      create_release:
        description: 'Create/update a GitHub Release for a v* ref'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build plugin
    runs-on: windows-latest

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      is_release_ref: ${{ steps.version.outputs.is_release_ref }}
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      zip_name: ${{ steps.package.outputs.zip_name }}

    steps:
      - name: Resolve ref
        id: ref
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $ref = '${{ github.event.inputs.ref }}'
          } else {
            $ref = '${{ github.ref_name }}'
          }
          "ref=$ref" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Building ref: $ref"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore KookBot-Unturned.sln

      - name: Build Release
        run: dotnet build KookBot-Unturned.sln -c Release --no-restore -v:minimal

      - name: Run tests
        run: dotnet test KookBot-Unturned.sln -c Release --no-build -v:minimal

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content 'KookBot-Unturned.csproj'
          $projectVersion = $project.Project.PropertyGroup.Version
          $ref = '${{ steps.ref.outputs.ref }}'
          $isReleaseRef = $ref -match '^v\d+\.\d+\.\d+.*$'
          if ($isReleaseRef) {
            $tag = $ref
            $version = $ref -replace '^v', ''
          } else {
            $tag = ""
            $version = $projectVersion
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "is_release_ref=$($isReleaseRef.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Project version: $projectVersion"
          Write-Host "Package version: $version"
          Write-Host "Release ref: $isReleaseRef"

      - name: Package release files
        id: package
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $zipName = "KookBot-Unturned-$version.zip"
          $artifactName = "KookBot-Unturned-$version"
          New-Item -ItemType Directory -Force -Path 'release' | Out-Null
          Copy-Item 'bin\Release\net48\KookBot-Unturned.dll' -Destination 'release\KookBot-Unturned.dll' -Force
          Copy-Item 'KookBot-Unturned.configuration.template.xml' -Destination 'release\KookBot-Unturned.configuration.template.xml' -Force
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path 'release\*' -DestinationPath $zipName -Force
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate checksums
        shell: pwsh
        run: |
          $zipName = '${{ steps.package.outputs.zip_name }}'
          $zipHash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLowerInvariant()
          $dllHash = (Get-FileHash 'release\KookBot-Unturned.dll' -Algorithm SHA256).Hash.ToLowerInvariant()
          "$zipHash  $zipName" | Out-File -FilePath 'checksums.sha256' -Encoding ascii
          "$dllHash  KookBot-Unturned.dll" | Out-File -FilePath 'checksums.sha256' -Encoding ascii -Append
          Get-Content 'checksums.sha256'

      - name: Generate release notes
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $tag = '${{ steps.version.outputs.tag }}'
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "build-$version" }
          $notes = @(
            "## KookBot-Unturned $tag",
            "",
            "### Assets",
            "- ``KookBot-Unturned-$version.zip``: plugin binary plus configuration template.",
            "- ``KookBot-Unturned.dll``: plugin binary only.",
            "- ``checksums.sha256``: SHA-256 checksums for release assets.",
            "",
            "### Install",
            "1. Back up the current ``Rocket/Plugins/KookBot-Unturned.dll`` and ``Rocket/Plugins/KookBot-Unturned/KookBot-Unturned.configuration.xml``.",
            "2. Copy ``KookBot-Unturned.dll`` into ``Rocket/Plugins/``.",
            "3. Keep the existing production configuration unless intentionally changing settings.",
            "4. Restart the target server/container.",
            "",
            "See ``docs/rollouts/`` for production rollout checklists."
          )
          $notes -join "`n" | Out-File -FilePath 'RELEASE_NOTES.md' -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            ${{ steps.package.outputs.zip_name }}
            release/KookBot-Unturned.dll
            release/KookBot-Unturned.configuration.template.xml
            checksums.sha256
            RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: >-
      needs.build.outputs.is_release_ref == 'true' &&
      (github.event_name == 'push' || inputs.create_release == true)
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: KookBot-Unturned ${{ needs.build.outputs.tag }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/${{ needs.build.outputs.zip_name }}
            dist/release/KookBot-Unturned.dll
            dist/checksums.sha256
          draft: false
          prerelease: false
