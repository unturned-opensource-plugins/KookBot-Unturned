name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Extract version from tag
      id: get_version
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $tag = "${{ github.event.inputs.tag }}"
        } else {
          $tag = "${{ github.ref_name }}"
        }
        $version = $tag -replace '^v', ''
        echo "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        echo "Tag: $tag, Version: $version"

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && 'master' || steps.get_version.outputs.TAG }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Prepare release files
      run: |
        New-Item -ItemType Directory -Force -Path "release" | Out-Null
        Copy-Item "bin\Release\net48\KookBot-Unturned.dll" -Destination "release\" -Force
        Copy-Item "KookBot-Unturned.configuration.template.xml" -Destination "release\" -Force

    - name: Create release archive
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        Compress-Archive -Path "release\*" -DestinationPath "KookBot-Unturned-$version.zip" -Force

    - name: Generate release notes
      id: release_notes
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $date = Get-Date -Format "yyyy-MM-dd"
        $notes = "# KookBot-Unturned v$version Release Notes`n`n"
        $notes += "## Release Info`n"
        $notes += "- **Version**: $version`n"
        $notes += "- **Release Date**: $date`n`n"
        $notes += "## Features`n`n"
        $notes += "### Core Features`n"
        $notes += "- **Bidirectional Sync**: Game server events sync to Kook channel and vice versa`n"
        $notes += "- **Server Management**: Execute commands from Kook (/help, /status, /say, /cmd)`n"
        $notes += "- **Rich Card Messages**: All notifications use Kook card format for better display`n"
        $notes += "- **Chat Moderation**: Rate limiting, spam detection, profanity filter`n"
        $notes += "- **Auto Update**: Automatic updates from GitHub Releases`n"
        $notes += "- **Hot Reload**: Configuration changes apply without restart`n`n"
        $notes += "## Installation`n`n"
        $notes += "1. Copy ``KookBot-Unturned.dll`` to ``Rocket/Plugins/``n"
        $notes += "2. Copy ``KookBot-Unturned.configuration.template.xml`` to ``Rocket/Plugins/KookBot-Unturned/KookBot-Unturned.configuration.xml``n"
        $notes += "3. Edit configuration with your Kook Bot Token and Channel ID`n"
        $notes += "4. Restart server`n`n"
        $notes += "## Requirements`n`n"
        $notes += "- Unturned Dedicated Server`n"
        $notes += "- RocketMod 3.x`n"
        $notes += "- .NET Framework 4.8`n`n"
        $notes += "## License`n`n"
        $notes += "GNU Affero General Public License v3.0`n"
        $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8 -NoNewline

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        files: |
          KookBot-Unturned-${{ steps.get_version.outputs.VERSION }}.zip
          bin/Release/net48/KookBot-Unturned.dll
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
